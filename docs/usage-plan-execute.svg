<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" font-family="Palatino, Palatino Linotype, Georgia, serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#7a706a"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#7a9ab0"/>
    </marker>
  </defs>

  <!-- ── Main flow ── -->
  <rect x="20" y="100" width="130" height="52" rx="6" fill="#f0ebe4" stroke="#c4b9ab" stroke-width="1.5"/>
  <text x="85" y="122" text-anchor="middle" font-size="14" fill="#5c4a3a" font-weight="bold">Describe Goal</text>
  <text x="85" y="140" text-anchor="middle" font-size="12" fill="#8a7e74">"Build a REST API"</text>

  <rect x="190" y="100" width="120" height="52" rx="6" fill="#dce4ec" stroke="#9ab0c4" stroke-width="1.5"/>
  <text x="250" y="122" text-anchor="middle" font-size="14" fill="#2c4a6e" font-weight="bold">AI Plans</text>
  <text x="250" y="140" text-anchor="middle" font-size="12" fill="#5a7a9a">Task graph generated</text>

  <rect x="370" y="100" width="120" height="52" rx="6" fill="#dce4ec" stroke="#9ab0c4" stroke-width="1.5"/>
  <text x="430" y="122" text-anchor="middle" font-size="14" fill="#2c4a6e" font-weight="bold">Review Plan</text>
  <text x="430" y="140" text-anchor="middle" font-size="12" fill="#5a7a9a">Edit, add, remove</text>

  <rect x="550" y="100" width="130" height="52" rx="6" fill="#dce4ec" stroke="#9ab0c4" stroke-width="1.5"/>
  <text x="615" y="122" text-anchor="middle" font-size="14" fill="#2c4a6e" font-weight="bold">Execute</text>
  <text x="615" y="140" text-anchor="middle" font-size="12" fill="#5a7a9a">Parallel on machines</text>

  <rect x="740" y="100" width="130" height="52" rx="6" fill="#dde5d9" stroke="#a3b89a" stroke-width="1.5"/>
  <text x="805" y="122" text-anchor="middle" font-size="14" fill="#3d6b3a" font-weight="bold">Results</text>
  <text x="805" y="140" text-anchor="middle" font-size="12" fill="#5a8a55">PRs, reports, code</text>

  <!-- Main flow arrows -->
  <line x1="150" y1="126" x2="187" y2="126" stroke="#7a706a" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="310" y1="126" x2="367" y2="126" stroke="#7a706a" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="490" y1="126" x2="547" y2="126" stroke="#7a706a" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="680" y1="126" x2="737" y2="126" stroke="#7a706a" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- ── Replan loop ── -->
  <rect x="260" y="20" width="140" height="40" rx="20" fill="#faf6f0" stroke="#c4b9ab" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="330" y="45" text-anchor="middle" font-size="13" fill="#8a7e74">Chat to replan</text>

  <!-- Curved arrow: Review Plan top → Chat bubble bottom-right -->
  <path d="M 410 100 C 410 72 400 68 395 60" fill="none" stroke="#7a9ab0" stroke-width="1.8" marker-end="url(#arr-blue)"/>
  <!-- Curved arrow: Chat bubble bottom-left → AI Plans top -->
  <path d="M 280 60 C 270 68 265 72 265 100" fill="none" stroke="#7a9ab0" stroke-width="1.8" marker-end="url(#arr-blue)"/>

  <!-- ── Steer mid-execution ── -->
  <rect x="560" y="200" width="140" height="40" rx="20" fill="#faf6f0" stroke="#c4b9ab" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="630" y="225" text-anchor="middle" font-size="13" fill="#8a7e74">Steer mid-task</text>

  <!-- Arrow from steer to execute -->
  <path d="M 615 200 L 615 155" fill="none" stroke="#7a9ab0" stroke-width="1.8" marker-end="url(#arr-blue)"/>

  <!-- ── Annotation ── -->
  <text x="450" y="280" text-anchor="middle" font-size="14" fill="#8a7e74" font-style="italic">Plan &#x2192; review &#x2192; execute. Replan anytime by chatting. Steer agents mid-flight.</text>
</svg>
