<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 720" font-family="Palatino, Palatino Linotype, Georgia, serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#9a918a"/>
    </marker>
    <marker id="arrow-dash" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#9a918a"/>
    </marker>
  </defs>

  <!-- ═══ Astro Server ═══ -->
  <rect x="120" y="30" width="660" height="150" rx="8" fill="#f0ebe4" stroke="#b8a99a" stroke-width="2"/>
  <text x="450" y="65" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a2744">Astro Server</text>
  <text x="450" y="88" text-anchor="middle" font-size="13" fill="#9a918a" font-style="italic">astroanywhere.com</text>

  <!-- Plan → Tasks → Dispatch boxes -->
  <rect x="160" y="105" width="150" height="55" rx="6" fill="#f0ebe4" stroke="#b8a99a" stroke-width="2"/>
  <text x="235" y="138" text-anchor="middle" font-size="16" fill="#3d3a37">Plan</text>

  <rect x="375" y="105" width="150" height="55" rx="6" fill="#f0ebe4" stroke="#b8a99a" stroke-width="2"/>
  <text x="450" y="138" text-anchor="middle" font-size="16" fill="#3d3a37">Tasks</text>

  <rect x="590" y="105" width="150" height="55" rx="6" fill="#f0ebe4" stroke="#b8a99a" stroke-width="2"/>
  <text x="665" y="138" text-anchor="middle" font-size="16" fill="#3d3a37">Dispatch</text>

  <!-- Plan → Tasks → Dispatch arrows -->
  <line x1="310" y1="132" x2="372" y2="132" stroke="#9a918a" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="525" y1="132" x2="587" y2="132" stroke="#9a918a" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- ═══ Arrow: Server → Runner (dispatch tasks) ═══ -->
  <line x1="490" y1="180" x2="490" y2="270" stroke="#9a918a" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="475" y="215" width="130" height="24" rx="4" fill="#f7f4f0" stroke="none"/>
  <text x="540" y="232" text-anchor="middle" font-size="13" fill="#3d3a37">dispatch tasks</text>

  <!-- ═══ Arrow: Runner → Server (report progress) ═══ -->
  <line x1="390" y1="270" x2="390" y2="180" stroke="#9a918a" stroke-width="3" stroke-dasharray="8,5" marker-end="url(#arrow-dash)"/>
  <rect x="280" y="215" width="125" height="24" rx="4" fill="#f7f4f0" stroke="none"/>
  <text x="342" y="232" text-anchor="middle" font-size="13" fill="#9a918a">report progress</text>

  <!-- ═══ Agent Runner ═══ -->
  <rect x="50" y="275" width="800" height="135" rx="8" fill="#f7f4f0" stroke="#b8a99a" stroke-width="2"/>
  <text x="450" y="305" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a2744">Agent Runner</text>

  <!-- Agent boxes -->
  <rect x="80" y="320" width="170" height="60" rx="6" fill="#dce4ec" stroke="#9ab0c4" stroke-width="2"/>
  <text x="165" y="356" text-anchor="middle" font-size="16" fill="#3d3a37">Claude Code</text>

  <rect x="270" y="320" width="140" height="60" rx="6" fill="#dce4ec" stroke="#9ab0c4" stroke-width="2"/>
  <text x="340" y="356" text-anchor="middle" font-size="16" fill="#3d3a37">Codex</text>

  <rect x="430" y="320" width="160" height="60" rx="6" fill="#dce4ec" stroke="#9ab0c4" stroke-width="2"/>
  <text x="510" y="356" text-anchor="middle" font-size="16" fill="#3d3a37">OpenClaw</text>

  <rect x="610" y="320" width="160" height="60" rx="6" fill="#dce4ec" stroke="#9ab0c4" stroke-width="2"/>
  <text x="690" y="356" text-anchor="middle" font-size="16" fill="#3d3a37">OpenCode</text>

  <!-- ═══ Arrow: Runner → Compute (deploy jobs) ═══ -->
  <line x1="490" y1="410" x2="490" y2="500" stroke="#9a918a" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="483" y="445" width="110" height="24" rx="4" fill="#f7f4f0" stroke="none"/>
  <text x="538" y="462" text-anchor="middle" font-size="13" fill="#3d3a37">deploy jobs</text>

  <!-- ═══ Arrow: Compute → Runner (results) ═══ -->
  <line x1="390" y1="500" x2="390" y2="410" stroke="#9a918a" stroke-width="3" stroke-dasharray="8,5" marker-end="url(#arrow-dash)"/>
  <rect x="335" y="445" width="70" height="24" rx="4" fill="#f7f4f0" stroke="none"/>
  <text x="370" y="462" text-anchor="middle" font-size="13" fill="#9a918a">results</text>

  <!-- ═══ Compute Backends ═══ -->
  <rect x="80" y="505" width="740" height="135" rx="8" fill="#f5eeea" stroke="#c4a99c" stroke-width="2"/>
  <text x="450" y="535" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a2744">Compute Backends</text>

  <!-- Compute boxes -->
  <rect x="110" y="550" width="150" height="60" rx="6" fill="#eaddd8" stroke="#c4a99c" stroke-width="2"/>
  <text x="185" y="586" text-anchor="middle" font-size="16" fill="#3d3a37">Docker</text>

  <rect x="280" y="550" width="140" height="60" rx="6" fill="#eaddd8" stroke="#c4a99c" stroke-width="2"/>
  <text x="350" y="586" text-anchor="middle" font-size="16" fill="#3d3a37">Slurm</text>

  <rect x="440" y="550" width="140" height="60" rx="6" fill="#eaddd8" stroke="#c4a99c" stroke-width="2"/>
  <text x="510" y="586" text-anchor="middle" font-size="16" fill="#3d3a37">K8s</text>

  <rect x="600" y="550" width="140" height="60" rx="6" fill="#eaddd8" stroke="#c4a99c" stroke-width="2"/>
  <text x="670" y="586" text-anchor="middle" font-size="16" fill="#3d3a37">SSH</text>
</svg>
