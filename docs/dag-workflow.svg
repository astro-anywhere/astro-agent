<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 320" font-family="Palatino, Palatino Linotype, Georgia, serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#7a706a"/>
    </marker>
  </defs>

  <!-- Subtle background behind parallel tasks column -->
  <rect x="352" y="25" width="156" height="270" rx="8" fill="#f7f4f0" stroke="none"/>

  <!-- ── Column 1: Goal ── -->
  <rect x="30" y="132" width="130" height="52" rx="6" fill="#f0ebe4" stroke="#c4b9ab" stroke-width="1.5"/>
  <text x="95" y="163" text-anchor="middle" font-size="17" fill="#5c4a3a">Describe goal</text>

  <!-- ── Column 2: Plan ── -->
  <rect x="200" y="132" width="110" height="52" rx="6" fill="#f0ebe4" stroke="#c4b9ab" stroke-width="1.5"/>
  <text x="255" y="163" text-anchor="middle" font-size="17" fill="#5c4a3a">Plan DAG</text>

  <!-- ── Column 3: Parallel tasks ── -->
  <rect x="365" y="42" width="130" height="52" rx="6" fill="#dce4ec" stroke="#9ab0c4" stroke-width="1.5"/>
  <text x="430" y="73" text-anchor="middle" font-size="17" fill="#2c4a6e">Task A</text>

  <rect x="365" y="132" width="130" height="52" rx="6" fill="#dce4ec" stroke="#9ab0c4" stroke-width="1.5"/>
  <text x="430" y="163" text-anchor="middle" font-size="17" fill="#2c4a6e">Task B</text>

  <rect x="365" y="222" width="130" height="52" rx="6" fill="#dce4ec" stroke="#9ab0c4" stroke-width="1.5"/>
  <text x="430" y="253" text-anchor="middle" font-size="17" fill="#2c4a6e">Task C</text>

  <!-- ── Column 4: Dependent tasks ── -->
  <rect x="550" y="87" width="130" height="52" rx="6" fill="#dce4ec" stroke="#9ab0c4" stroke-width="1.5"/>
  <text x="615" y="118" text-anchor="middle" font-size="17" fill="#2c4a6e">Task D</text>

  <rect x="550" y="197" width="130" height="52" rx="6" fill="#dce4ec" stroke="#9ab0c4" stroke-width="1.5"/>
  <text x="615" y="228" text-anchor="middle" font-size="17" fill="#2c4a6e">Task E</text>

  <!-- ── Column 5: Done ── -->
  <rect x="735" y="132" width="100" height="52" rx="6" fill="#dde5d9" stroke="#a3b89a" stroke-width="1.5"/>
  <text x="785" y="163" text-anchor="middle" font-size="17" fill="#3d6b3a">Done</text>

  <!-- ══════════════════════════════════════════════════ -->
  <!-- Arrows                                             -->
  <!-- ══════════════════════════════════════════════════ -->

  <!-- Goal → Plan -->
  <line x1="160" y1="158" x2="197" y2="158" stroke="#7a706a" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- Plan → A (fan out up) -->
  <line x1="310" y1="158" x2="362" y2="68" stroke="#7a706a" stroke-width="2.5" marker-end="url(#arr)"/>
  <!-- Plan → B (straight) -->
  <line x1="310" y1="158" x2="362" y2="158" stroke="#7a706a" stroke-width="2.5" marker-end="url(#arr)"/>
  <!-- Plan → C (fan out down) -->
  <line x1="310" y1="158" x2="362" y2="248" stroke="#7a706a" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- A → D -->
  <line x1="495" y1="68" x2="547" y2="113" stroke="#7a706a" stroke-width="2.5" marker-end="url(#arr)"/>
  <!-- B → D -->
  <line x1="495" y1="158" x2="547" y2="113" stroke="#7a706a" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- C → E -->
  <line x1="495" y1="248" x2="547" y2="223" stroke="#7a706a" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- D → Done -->
  <line x1="680" y1="113" x2="732" y2="158" stroke="#7a706a" stroke-width="2.5" marker-end="url(#arr)"/>
  <!-- E → Done -->
  <line x1="680" y1="223" x2="732" y2="158" stroke="#7a706a" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- Annotation -->
  <text x="430" y="312" text-anchor="middle" font-size="14" fill="#8a7e74" font-style="italic">A, B, C run in parallel &#x2014; total time = longest path</text>
</svg>
